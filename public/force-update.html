<!doctype html>
<html lang="ko">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>강남톡방 업데이트 초기화</title>
<style>
    html,body{height:100%;margin:0;background:#0b0b10;color:#fff;display:grid;place-items:center;font-family:system-ui,-apple-system,segoe ui,roboto}
    .card{max-width:560px;padding:24px;border-radius:16px;background:#15161a;box-shadow:0 10px 30px rgba(0,0,0,.35);text-align:center}
    button{margin-top:12px;padding:12px 16px;border-radius:12px;border:0;background:#ff2e87;color:#111;font-weight:800;cursor:pointer}
    .log{margin-top:12px;font:12px/1.4 ui-monospace,Menlo,Consolas,monospace;white-space:pre-wrap;opacity:.8;text-align:left}
</style>
<div class="card">
    <h1>업데이트 적용 중…</h1>
    <p>앱 캐시와 서비스워커를 초기화합니다. 1–2초 후 자동으로 새 버전을 엽니다.</p>
    <button id="btn">수동으로 다시 시도</button>
    <div class="log" id="log"></div>
</div>
<script>
    (async () => {
      const log = (...a)=>{ const el=document.getElementById('log'); el.textContent+=a.join(' ')+'\n' }
      try{
        if('serviceWorker' in navigator){
          const regs = await navigator.serviceWorker.getRegistrations();
          regs.forEach(r => r.unregister());
          log('SW unregistered:', regs.length);
        }
        if(window.caches?.keys){
          const keys = await caches.keys();
          await Promise.all(keys.map(k=>caches.delete(k)));
          log('Caches deleted:', keys.join(', ') || '(none)');
        }
      }catch(e){ log('Error:', e && (e.message||e)) }
      const go = ()=>location.replace('/?v=force'+Date.now());
      document.getElementById('btn').onclick = go;
      setTimeout(go, 800);
    })();
</script>
